<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Boy, the Mole, the Fox and the Horse</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Quicksand:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #dce8ec 0%, #e8ecdf 35%, #f3eee0 70%, #ead9c4 100%);
    font-family: 'Quicksand', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
    overflow-x: hidden;
    color: #3c4a3e;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 1.6rem;
    text-align: center;
    color: #4a5a44;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .subtitle {
    font-size: 0.78rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #8a9484;
    margin-bottom: 28px;
  }

  .stage {
    position: relative;
    width: min(360px, 88vw);
    aspect-ratio: 9/16;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 25px 60px -15px rgba(60,74,62,0.35), 0 0 0 1px rgba(255,255,255,0.4) inset;
    cursor: pointer;
    background: #cfd8d3;
  }

  .stage img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.1s ease-in-out;
    user-select: none;
    -webkit-user-drag: none;
  }

  .stage img.active {
    opacity: 1;
  }

  .stage::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 22px;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.18);
    pointer-events: none;
  }

  .hint {
    position: absolute;
    bottom: 12px;
    right: 14px;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.28);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    pointer-events: none;
    backdrop-filter: blur(2px);
  }

  .bubble-wrap {
    width: min(380px, 90vw);
    min-height: 92px;
    margin-top: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bubble {
    position: relative;
    background: #fffdf8;
    border-radius: 20px;
    padding: 20px 24px;
    box-shadow: 0 10px 30px -8px rgba(60,74,62,0.25);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.12rem;
    line-height: 1.5;
    color: #4a5240;
    text-align: center;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    border: 1px solid #ece5d4;
  }

  .bubble.show {
    opacity: 1;
    transform: translateY(0);
  }

  .bubble::before {
    content: '';
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 16px;
    height: 16px;
    background: #fffdf8;
    border-left: 1px solid #ece5d4;
    border-top: 1px solid #ece5d4;
  }

  .dots {
    display: flex;
    gap: 6px;
    margin-top: 18px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #c7cfc3;
    transition: background 0.3s, transform 0.3s;
  }

  .dot.on {
    background: #8a9a7d;
    transform: scale(1.3);
  }

  .ep-button {
    margin-top: 36px;
    display: inline-block;
    text-decoration: none;
    background: linear-gradient(135deg, #5b6f57, #44563f);
    color: #fdfaf2;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 1px;
    padding: 14px 38px;
    border-radius: 50px;
    box-shadow: 0 10px 25px -6px rgba(50,65,45,0.45);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .ep-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 30px -6px rgba(50,65,45,0.55);
  }

  .ep-button:active {
    transform: translateY(0px) scale(0.98);
  }

  footer {
    margin-top: 14px;
    font-size: 0.7rem;
    color: #9aa394;
    letter-spacing: 0.5px;
  }
</style>
</head>

  <a class="ep-button" href="https://easypagex.github.io" target="_blank" rel="noopener">EasyPageX</a>

  <footer>made with care, one step at a time</footer>

<script>
  const quotes = [
    "\u201cWhat do you want to be when you grow up?\u201d \u201cKind,\u201d said the boy.",
    "\u201cWhat is the bravest thing you\u2019ve ever said?\u201d \u201cHelp,\u201d said the horse.",
    "\u201cAsking for help isn\u2019t giving up. It\u2019s refusing to give up.\u201d",
    "\u201cAlways remember you matter, you\u2019re important and you are loved.\u201d",
    "\u201cI\u2019m so small,\u201d said the mole. \u201cYes, but you make a huge difference.\u201d",
    "\u201cWhat do you think success is?\u201d \u201cTo love,\u201d said the mole.",
    "\u201cComparing yourself to others is the biggest waste of time.\u201d",
    "\u201cDon\u2019t measure how valuable you are by the way you are treated.\u201d",
    "\u201cLove doesn\u2019t need you to be extraordinary.\u201d",
    "\u201cThe best gifts in life are people who make us feel loved.\u201d",
    "\u201cOne of our greatest freedoms is how we react to things.\u201d",
    "\u201cI can\u2019t see a way through.\u201d \u201cJust take the next step.\u201d",
    "\u201cMost old moles wish they had listened less to fears and more to dreams.\u201d",
    "\u201cI\u2019m glad we\u2019re all here.\u201d",
    "\u201cBeing honest is always interesting.\u201d"
  ];

  let quoteIndex = 0;
  let showingFirst = true;

  const imgA = document.getElementById('imgA');
  const imgB = document.getElementById('imgB');
  const stage = document.getElementById('stage');
  const bubble = document.getElementById('bubble');
  const dotsWrap = document.getElementById('dots');

  // build dots
  quotes.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    dotsWrap.appendChild(d);
  });

  function setDot(i) {
    document.querySelectorAll('.dot').forEach(d => d.classList.remove('on'));
    const el = document.getElementById('dot-' + i);
    if (el) el.classList.add('on');
  }

  function playBirdSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;

      function chirp(startOffset, freqStart, freqEnd, dur, gainPeak) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freqStart, now + startOffset);
        osc.frequency.exponentialRampToValueAtTime(freqEnd, now + startOffset + dur);
        gain.gain.setValueAtTime(0.0001, now + startOffset);
        gain.gain.exponentialRampToValueAtTime(gainPeak, now + startOffset + dur * 0.25);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + startOffset + dur);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + startOffset);
        osc.stop(now + startOffset + dur + 0.05);
      }

      // a little 3-note bird trill
      chirp(0,    2200, 3000, 0.09, 0.06);
      chirp(0.11, 2600, 2000, 0.08, 0.05);
      chirp(0.22, 3000, 3600, 0.07, 0.05);

      setTimeout(() => ctx.close(), 600);
    } catch (e) {
      // audio not available, fail silently
    }
  }

  function showQuote(index) {
    bubble.classList.remove('show');
    setTimeout(() => {
      bubble.textContent = quotes[index];
      bubble.classList.add('show');
      setDot(index);
    }, 280);
  }

  function toggleImage() {
    if (showingFirst) {
      imgA.classList.remove('active');
      imgB.classList.add('active');
    } else {
      imgB.classList.remove('active');
      imgA.classList.add('active');
    }
    showingFirst = !showingFirst;
    playBirdSound();
  }

  function advance() {
    toggleImage();
    quoteIndex = (quoteIndex + 1) % quotes.length;
    showQuote(quoteIndex);
  }

  stage.addEventListener('click', advance);

  // initial quote
  showQuote(quoteIndex);

  // automatic cycling every 8 seconds
  setInterval(advance, 8000);
</script>

</body>
</html>
